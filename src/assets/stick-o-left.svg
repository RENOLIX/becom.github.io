    </filter>
  </defs>
  <g filter="url(#leftShadow)">
    <rect x="30" y="22" width="130" height="46" rx="23" fill="url(#leftBody)" transform="rotate(-8 95 45)"/>
    <circle cx="160" cy="45" r="28" fill="url(#leftCap)"/>
