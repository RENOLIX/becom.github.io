      <stop stop-color="#ff5b4f"/>
      <stop offset="1" stop-color="#df2f38"/>
    </linearGradient>
    <linearGradient id="leftCap" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#ffd865"/>
      <stop offset="1" stop-color="#f2a91d"/>
    </linearGradient>
    <filter id="leftShadow" x="-20%" y="-30%" width="140%" height="160%">
