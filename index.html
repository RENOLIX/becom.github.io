<!doctype html>
<html lang="fr" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var language = localStorage.getItem("becom-language") === "ar" ? "ar" : "fr";
          var isAdmin = location.pathname.indexOf("/admin") === 0;
          var effectiveLanguage = isAdmin ? "fr" : language;
          document.documentElement.lang = effectiveLanguage;
          document.documentElement.dir = effectiveLanguage === "ar" ? "rtl" : "ltr";
          document.documentElement.dataset.language = effectiveLanguage;
          if (effectiveLanguage === "ar") document.documentElement.classList.add("language-preload");
        } catch (error) {
          document.documentElement.lang = "fr";
          document.documentElement.dir = "ltr";
        }
      })();
    </script>
    <style>
      html.language-preload #root { opacity: 0; }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4c83bd" />
    <meta name="description" content="BECOM Store, des jouets qui font grandir l'imagination." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>BECOM Store | Jouer, apprendre, grandir</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
